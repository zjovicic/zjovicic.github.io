<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ћирилица → Звук</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 50%, #0d0d1a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 760px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #ff6b6b, #c56cf0, #6b7fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 28px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 110px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px;
            color: #e0e0e0;
            font-size: 17px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
            line-height: 1.6;
        }

        textarea:focus { border-color: #c56cf0; }
        textarea::placeholder { color: #444; }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
        }

        input[type="number"] {
            width: 72px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 8px 10px;
            color: #e0e0e0;
            font-size: 15px;
            text-align: center;
            outline: none;
        }

        input[type="number"]:focus { border-color: #c56cf0; }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
            flex: 1;
            min-width: 80px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #c56cf0;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(197,108,240,0.5);
        }

        select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 8px 12px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        select:focus { border-color: #c56cf0; }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        .btn-play {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }
        .btn-play:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
        }

        .btn-stop {
            background: linear-gradient(135deg, #6b7fff, #5352ed);
            color: #fff;
        }
        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107,127,255,0.35);
        }

        .btn-download {
            background: linear-gradient(135deg, #2ecc71, #1abc9c);
            color: #fff;
        }
        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46,204,113,0.35);
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 16px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #c56cf0, #6b7fff);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .note-display {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 38px;
            align-items: center;
        }

        .note-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 34px;
            padding: 0 4px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.15s;
            cursor: default;
            position: relative;
        }

        .note-char.vowel { border-bottom: 2px solid rgba(255,107,107,0.4); }
        .note-char.consonant { border-bottom: 2px solid rgba(107,127,255,0.4); }
        .note-char.space-char {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.1);
            color: #333;
            font-size: 11px;
            min-width: 28px;
        }

        .note-char.active {
            background: #c56cf0 !important;
            border-color: #c56cf0 !important;
            color: #fff;
            transform: scale(1.25);
            box-shadow: 0 0 20px rgba(197,108,240,0.6);
            z-index: 2;
        }

        .note-char.played {
            background: rgba(197,108,240,0.15);
            border-color: rgba(197,108,240,0.25);
        }

        .now-playing {
            text-align: center;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .now-letter {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #c56cf0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .now-info {
            font-size: 13px;
            color: #666;
        }

        .now-placeholder {
            font-size: 13px;
            color: #444;
        }

        .freq-canvas {
            width: 100%;
            height: 60px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 10px;
            font-size: 11px;
            color: #555;
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }

        .legend-dot.v { background: rgba(255,107,107,0.6); }
        .legend-dot.c { background: rgba(107,127,255,0.6); }
        .legend-dot.s { border: 1px dashed rgba(255,255,255,0.2); }

        .ref-toggle {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            flex: none;
            letter-spacing: 1px;
        }
        .ref-toggle:hover { color: #888; border-color: rgba(255,255,255,0.15); }

        .ref-table {
            display: none;
            margin-top: 12px;
        }

        .ref-table.open { display: block; }

        .ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 4px;
        }

        .ref-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 5px;
            font-size: 13px;
        }

        .ref-item .rl { font-weight: 700; color: #c56cf0; }
        .ref-item .rf { color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 Ћирилица → Звук</h1>
    <p class="subtitle">Претворите српски ћирилични текст у микротоналну мелодију</p>

    <!-- INPUT -->
    <div class="card">
        <div class="card-label">Текст</div>
        <textarea id="textInput" placeholder="Унесите текст на српској ћирилици...">Здраво свијете</textarea>
    </div>

    <!-- CONTROLS -->
    <div class="card">
        <div class="card-label">Подешавања</div>
        <div class="controls-row">
            <div class="control-group">
                <label>Темпо:</label>
                <input type="number" id="bpmNum" value="120" min="40" max="300">
                <label>BPM</label>
            </div>
            <input type="range" id="bpmRange" min="40" max="300" value="120">
            <div class="control-group">
                <label>Талас:</label>
                <select id="waveform">
                    <option value="sine">Синусни</option>
                    <option value="triangle">Троугаони</option>
                    <option value="square">Квадратни</option>
                    <option value="sawtooth">Тестерасти</option>
                </select>
            </div>
        </div>
        <div class="buttons" style="margin-top:14px;">
            <button class="btn-play" id="playBtn">▶ Репродукуј</button>
            <button class="btn-stop" id="stopBtn" disabled>⏹ Заустави</button>
            <button class="btn-download" id="downloadBtn">⬇ Преузми WAV</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- DISPLAY -->
    <div class="card">
        <div class="card-label">Нотни приказ</div>
        <div class="note-display" id="noteDisplay">
            <span class="now-placeholder" id="emptyHint">Притисните „Репродукуј" за почетак</span>
        </div>
        <div class="legend">
            <span><span class="legend-dot v"></span> Самогласник (♩)</span>
            <span><span class="legend-dot c"></span> Сугласник (♪)</span>
            <span><span class="legend-dot s"></span> Пауза (𝄾)</span>
        </div>
    </div>

    <!-- NOW PLAYING -->
    <div class="card">
        <div class="card-label">Тренутна нота</div>
        <div class="now-playing" id="nowPlaying">
            <span class="now-placeholder">—</span>
        </div>
        <canvas class="freq-canvas" id="visCanvas"></canvas>
    </div>

    <!-- REFERENCE TABLE -->
    <button class="ref-toggle" id="refToggle">▼ ТАБЕЛА ФРЕКВЕНЦИЈА ▼</button>
    <div class="ref-table" id="refTable">
        <div class="card" style="padding:16px">
            <div class="ref-grid" id="refGrid"></div>
        </div>
    </div>
</div>

<script>
// ─── FREQUENCY MAP ───────────────────────────────────────────
const FREQ = {
    'А':262,'Б':268,'В':274,'Г':280,'Д':287,
    'Ђ':294,'Е':301,'Ж':308,'З':315,'И':322,
    'Ј':330,'К':337,'Л':345,'Љ':353,'М':362,
    'Н':370,'Њ':379,'О':387,'П':397,'Р':406,
    'С':415,'Т':425,'Ћ':435,'У':445,'Ф':456,
    'Х':466,'Ц':477,'Ч':488,'Џ':500,'Ш':511
};

const VOWELS = new Set(['А','Е','И','О','У']);

// ─── STATE ───────────────────────────────────────────────────
let audioCtx = null;
let isPlaying = false;
let timeoutIds = [];
let animFrame = null;
let analyser = null;
let currentFreq = 0;

// ─── DOM ─────────────────────────────────────────────────────
const $text      = document.getElementById('textInput');
const $bpmNum    = document.getElementById('bpmNum');
const $bpmRange  = document.getElementById('bpmRange');
const $waveform  = document.getElementById('waveform');
const $playBtn   = document.getElementById('playBtn');
const $stopBtn   = document.getElementById('stopBtn');
const $dlBtn     = document.getElementById('downloadBtn');
const $progress  = document.getElementById('progressFill');
const $noteDisp  = document.getElementById('noteDisplay');
const $nowPlay   = document.getElementById('nowPlaying');
const $canvas    = document.getElementById('visCanvas');
const $refToggle = document.getElementById('refToggle');
const $refTable  = document.getElementById('refTable');
const $refGrid   = document.getElementById('refGrid');

// ─── BPM SYNC ────────────────────────────────────────────────
$bpmNum.addEventListener('input', () => {
    $bpmRange.value = $bpmNum.value;
});
$bpmRange.addEventListener('input', () => {
    $bpmNum.value = $bpmRange.value;
});

// ─── REFERENCE TABLE ─────────────────────────────────────────
$refToggle.addEventListener('click', () => {
    $refTable.classList.toggle('open');
    $refToggle.textContent = $refTable.classList.contains('open')
        ? '▲ САКРИЈ ТАБЕЛУ ▲' : '▼ ТАБЕЛА ФРЕКВЕНЦИЈА ▼';
});

Object.entries(FREQ).forEach(([letter, freq]) => {
    const div = document.createElement('div');
    div.className = 'ref-item';
    const type = VOWELS.has(letter) ? '♩' : '♪';
    div.innerHTML = `<span class="rl">${letter}</span><span class="rf">${freq} Hz ${type}</span>`;
    $refGrid.appendChild(div);
});

// ─── BUTTONS ─────────────────────────────────────────────────
$playBtn.addEventListener('click', play);
$stopBtn.addEventListener('click', stop);
$dlBtn.addEventListener('click', download);

// ─── PARSE ───────────────────────────────────────────────────
function parseText(text, bpm) {
    const q = 60 / bpm;        // quarter note duration
    const e = q / 2;           // eighth note duration
    const events = [];
    const upper = text.toUpperCase();

    for (let i = 0; i < upper.length; i++) {
        const ch = upper[i];
        if (ch === ' ' || ch === '\n' || ch === '\t') {
            events.push({ type:'rest', duration:q, char:'⌴', original:text[i] });
        } else if (FREQ[ch] !== undefined) {
            const v = VOWELS.has(ch);
            events.push({
                type:'note',
                frequency: FREQ[ch],
                duration: v ? q : e,
                char: text[i],
                upperChar: ch,
                isVowel: v
            });
        }
    }
    return events;
}

// ─── BUILD NOTE DISPLAY ──────────────────────────────────────
function buildDisplay(events) {
    $noteDisp.innerHTML = '';
    events.forEach((ev, i) => {
        const span = document.createElement('span');
        span.id = 'nc-' + i;
        if (ev.type === 'rest') {
            span.className = 'note-char space-char';
            span.textContent = '⌴';
            span.title = 'Пауза (♩)';
        } else {
            span.className = 'note-char ' + (ev.isVowel ? 'vowel' : 'consonant');
            span.textContent = ev.char;
            span.title = `${ev.upperChar} = ${ev.frequency} Hz  ${ev.isVowel ? '♩ четвртинка' : '♪ осминка'}`;
        }
        $noteDisp.appendChild(span);
    });
}

// ─── SCHEDULE OSCILLATORS ────────────────────────────────────
function scheduleNotes(ctx, dest, events, t0, waveType) {
    let t = t0;
    events.forEach(ev => {
        if (ev.type === 'note') {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = waveType;
            osc.frequency.value = ev.frequency;

            const dur   = ev.duration * 0.88;
            const att   = Math.min(0.008, dur * 0.1);
            const rel   = Math.min(0.025, dur * 0.15);
            const peak  = waveType === 'square' ? 0.15 :
                          waveType === 'sawtooth' ? 0.18 : 0.28;

            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(peak, t + att);
            if (dur > att + rel) {
                gain.gain.setValueAtTime(peak, t + dur - rel);
            }
            gain.gain.linearRampToValueAtTime(0, t + dur);

            osc.connect(gain);
            gain.connect(dest);
            osc.start(t);
            osc.stop(t + dur + 0.01);
        }
        t += ev.duration;
    });
    return t;
}

// ─── CANVAS VISUALIZER ──────────────────────────────────────
function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    $canvas.width  = $canvas.clientWidth  * dpr;
    $canvas.height = $canvas.clientHeight * dpr;
    const cx = $canvas.getContext('2d');
    cx.scale(dpr, dpr);
    return cx;
}

function drawVisualization() {
    if (!isPlaying || !analyser) return;
    const cx = $canvas.getContext('2d');
    const w  = $canvas.clientWidth;
    const h  = $canvas.clientHeight;

    const bufLen = analyser.frequencyBinCount;
    const data   = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(data);

    cx.clearRect(0, 0, w, h);

    // Waveform
    cx.beginPath();
    cx.strokeStyle = 'rgba(197,108,240,0.7)';
    cx.lineWidth   = 2;
    const sliceW   = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
        const v = data[i] / 128.0;
        const y = (v * h) / 2;
        if (i === 0) cx.moveTo(x, y);
        else cx.lineTo(x, y);
        x += sliceW;
    }
    cx.stroke();

    // Frequency label
    if (currentFreq > 0) {
        cx.fillStyle = 'rgba(255,255,255,0.15)';
        cx.font = 'bold 28px sans-serif';
        cx.textAlign = 'right';
        cx.fillText(currentFreq + ' Hz', w - 10, h - 10);
    }

    animFrame = requestAnimationFrame(drawVisualization);
}

// ─── PLAY ────────────────────────────────────────────────────
function play() {
    const text = $text.value;
    const bpm  = Math.max(40, Math.min(300, parseInt($bpmNum.value) || 120));
    $bpmNum.value = bpm;
    $bpmRange.value = bpm;

    if (!text.trim()) { alert('Молим вас, унесите текст!'); return; }

    const events = parseText(text, bpm);
    if (!events.some(e => e.type === 'note')) {
        alert('Текст не садржи препознатљиве ћириличне карактере!');
        return;
    }

    stop();

    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.connect(audioCtx.destination);

    isPlaying = true;
    $playBtn.disabled = true;
    $stopBtn.disabled = false;

    buildDisplay(events);
    initCanvas();

    const wave = $waveform.value;
    const t0   = audioCtx.currentTime + 0.06;
    const tEnd = scheduleNotes(audioCtx, analyser, events, t0, wave);
    const totalDur = tEnd - t0;

    // Visual scheduling
    let elapsed = 0;
    events.forEach((ev, i) => {
        const delay = elapsed * 1000;
        const tid = setTimeout(() => {
            if (!isPlaying) return;

            // Highlight note
            document.querySelectorAll('.note-char.active').forEach(el => {
                el.classList.remove('active');
                el.classList.add('played');
            });
            const el = document.getElementById('nc-' + i);
            if (el) el.classList.add('active');

            // Now-playing info
            if (ev.type === 'note') {
                currentFreq = ev.frequency;
                $nowPlay.innerHTML =
                    `<span class="now-letter">${ev.char}</span>` +
                    `<span class="now-info">${ev.frequency} Hz · ${ev.isVowel ? '♩ четвртинка (самогласник)' : '♪ осминка (сугласник)'}</span>`;
            } else {
                currentFreq = 0;
                $nowPlay.innerHTML = `<span class="now-info">𝄾 пауза</span>`;
            }

            // Progress
            $progress.style.width = Math.min(100, (elapsed / totalDur) * 100) + '%';
        }, delay + 60);
        timeoutIds.push(tid);
        elapsed += ev.duration;
    });

    // End
    const endTid = setTimeout(() => {
        $progress.style.width = '100%';
        document.querySelectorAll('.note-char.active').forEach(el => {
            el.classList.remove('active');
            el.classList.add('played');
        });
        currentFreq = 0;
        $nowPlay.innerHTML = '<span class="now-info">✓ Завршено</span>';
        setTimeout(stop, 600);
    }, elapsed * 1000 + 100);
    timeoutIds.push(endTid);

    drawVisualization();
}

// ─── STOP ────────────────────────────────────────────────────
function stop() {
    isPlaying = false;
    currentFreq = 0;

    timeoutIds.forEach(t => clearTimeout(t));
    timeoutIds = [];

    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

    if (audioCtx) {
        try { audioCtx.close(); } catch(e) {}
        audioCtx = null;
        analyser = null;
    }

    $playBtn.disabled = false;
    $stopBtn.disabled = true;

    // Clear canvas
    const cx = $canvas.getContext('2d');
    cx.clearRect(0, 0, $canvas.clientWidth, $canvas.clientHeight);
}

// ─── DOWNLOAD WAV ────────────────────────────────────────────
async function download() {
    const text = $text.value;
    const bpm  = Math.max(40, Math.min(300, parseInt($bpmNum.value) || 120));

    if (!text.trim()) { alert('Молим вас, унесите текст!'); return; }

    const events = parseText(text, bpm);
    if (!events.some(e => e.type === 'note')) {
        alert('Текст не садржи препознатљиве ћириличне карактере!');
        return;
    }

    $dlBtn.textContent = '⏳ Генерисање...';
    $dlBtn.disabled = true;

    // Calculate total duration
    let totalDur = 0;
    events.forEach(e => totalDur += e.duration);
    totalDur += 0.1;

    const sr = 44100;
    const offCtx = new OfflineAudioContext(1, Math.ceil(sr * totalDur), sr);

    scheduleNotes(offCtx, offCtx.destination, events, 0, $waveform.value);

    try {
        const buf = await offCtx.startRendering();
        const blob = encodeWAV(buf);

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'cirilica_melodija.wav';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (err) {
        console.error(err);
        alert('Грешка при генерисању аудио фајла.');
    }

    $dlBtn.textContent = '⬇ Преузми WAV';
    $dlBtn.disabled = false;
}

// ─── WAV ENCODER ─────────────────────────────────────────────
function encodeWAV(audioBuffer) {
    const samples    = audioBuffer.getChannelData(0);
    const sampleRate = audioBuffer.sampleRate;
    const numSamples = samples.length;
    const bps = 16;
    const byteRate   = sampleRate * (bps / 8);
    const dataSize   = numSamples * (bps / 8);
    const buffer     = new ArrayBuffer(44 + dataSize);
    const v          = new DataView(buffer);

    // RIFF
    writeStr(v, 0, 'RIFF');
    v.setUint32(4, 36 + dataSize, true);
    writeStr(v, 8, 'WAVE');

    // fmt
    writeStr(v, 12, 'fmt ');
    v.setUint32(16, 16, true);
    v.setUint16(20, 1, true);       // PCM
    v.setUint16(22, 1, true);       // mono
    v.setUint32(24, sampleRate, true);
    v.setUint32(28, byteRate, true);
    v.setUint16(32, bps / 8, true); // block align
    v.setUint16(34, bps, true);

    // data
    writeStr(v, 36, 'data');
    v.setUint32(40, dataSize, true);

    let off = 44;
    for (let i = 0; i < numSamples; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        off += 2;
    }

    return new Blob([buffer], { type: 'audio/wav' });
}

function writeStr(view, offset, str) {
    for (let i = 0; i < str.length; i++)
        view.setUint8(offset + i, str.charCodeAt(i));
}
